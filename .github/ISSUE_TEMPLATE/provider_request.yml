name: Provider request
description: Request support for a new AI provider
labels: ["provider-adapter"]
body:
  - type: input
    id: provider-name
    attributes:
      label: Provider name
    validations:
      required: true
  - type: dropdown
    id: api-type
    attributes:
      label: API type
      options:
        - OpenAI-compatible
        - Native (custom SDK)
    validations:
      required: true
  - type: input
    id: docs-url
    attributes:
      label: API documentation URL
    validations:
      required: true
  - type: checkboxes
    id: tasks
    attributes:
      label: Supported tasks needed
      options:
        - label: ask / stream
        - label: embed
        - label: classify / extract
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
