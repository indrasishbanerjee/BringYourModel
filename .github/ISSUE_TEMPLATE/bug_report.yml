name: Bug report
description: Report a bug in BYOM Wallet or the SDK
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 1.0.0
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 131
  - type: input
    id: provider
    attributes:
      label: Provider kind
      placeholder: e.g. ollama, openai
  - type: dropdown
    id: vault-state
    attributes:
      label: Vault state
      options:
        - Unlocked
        - Locked
        - Unknown
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Do not include API keys or passphrases
